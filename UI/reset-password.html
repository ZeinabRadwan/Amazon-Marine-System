<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Marine — تعيين كلمة مرور جديدة</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <img src="logo/logo (1).png" alt="Amazon Marine Logo">
                <h2>Amazon Marine</h2>
                <p>تعيين كلمة مرور جديدة</p>
            </div>
            <div class="form-group">
                <label class="form-label">كلمة المرور الجديدة</label>
                <input type="password" class="form-control" id="newPassword" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label class="form-label">تأكيد كلمة المرور</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="handleResetSubmit()" style="width:100%;">
                <i class='bx bx-lock-alt'></i> حفظ كلمة المرور
            </button>
            <div style="margin-top:24px;text-align:center;">
                <a href="index.html" style="font-size:0.85rem;color:var(--accent-cyan);">العودة لتسجيل الدخول</a>
            </div>
        </div>
    </div>
    <script>
        function handleResetSubmit() {
            const p1 = document.getElementById('newPassword').value;
            const p2 = document.getElementById('confirmPassword').value;
            if (!p1 || p1.length < 6) { alert('كلمة المرور 6 أحرف على الأقل'); return; }
            if (p1 !== p2) { alert('كلمتا المرور غير متطابقتين'); return; }
            alert('تم تغيير كلمة المرور بنجاح');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
