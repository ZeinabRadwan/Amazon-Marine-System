<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Marine — تسجيل الدخول</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            overflow: auto;
        }

        .role-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }
        @media (min-width: 600px) {
            .role-selector.role-selector-7 { grid-template-columns: repeat(4, 1fr); }
        }

        .role-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 14px 6px;
            border-radius: 12px;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.25s;
            background: var(--bg-card);
        }

        .role-option:hover {
            border-color: var(--navy-400);
            background: rgba(30, 42, 90, 0.03);
        }

        .role-option.selected {
            border-color: var(--navy-700);
            background: rgba(30, 42, 90, 0.06);
        }

        .role-option .role-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.25s;
        }

        .role-option.selected .role-icon {
            color: #fff !important;
        }

        .role-option .role-name {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
        }

        .role-option.selected .role-name {
            color: var(--navy-800);
        }

        .role-option .role-user {
            font-size: 0.62rem;
            color: var(--text-muted);
            text-align: center;
        }

        .login-card {
            max-width: 560px !important;
        }

        .role-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .role-divider::before,
        .role-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .role-divider span {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <img src="logo/logo (1).png" alt="Amazon Marine Logo">
                <h2>Amazon Marine</h2>
                <p>Shipping Agency — نظام إدارة الشحن</p>
            </div>

            <!-- Role Selector -->
            <div class="role-divider"><span>اختر صلاحيتك / Select Role</span></div>

            <div class="role-selector role-selector-7" id="roleSelector">
                <div class="role-option selected" data-role="admin" onclick="selectRole(this)">
                    <div class="role-icon" data-color="#1a2150" style="background:rgba(30,42,90,0.1);color:#1a2150;">
                        <i class='bx bx-shield-quarter'></i>
                    </div>
                    <span class="role-name">مدير النظام</span>
                    <span class="role-user">Capt. Mostafa</span>
                </div>
                <div class="role-option" data-role="sales" onclick="selectRole(this)">
                    <div class="role-icon" data-color="#17a2b8" style="background:rgba(23,162,184,0.1);color:#17a2b8;">
                        <i class='bx bx-trending-up'></i>
                    </div>
                    <span class="role-name">مبيعات</span>
                    <span class="role-user">أحمد خيري</span>
                </div>
                <div class="role-option" data-role="accounting" onclick="selectRole(this)">
                    <div class="role-icon" data-color="#d4a853" style="background:rgba(212,168,83,0.12);color:#d4a853;">
                        <i class='bx bx-calculator'></i>
                    </div>
                    <span class="role-name">محاسبة</span>
                    <span class="role-user">كريم عادل</span>
                </div>
                <div class="role-option" data-role="pricing" onclick="selectRole(this)">
                    <div class="role-icon" data-color="#8b5cf6" style="background:rgba(139,92,246,0.12);color:#8b5cf6;">
                        <i class='bx bx-tag'></i>
                    </div>
                    <span class="role-name">فريق التسعير</span>
                    <span class="role-user">نادية حسن</span>
                </div>
                <div class="role-option" data-role="operation" onclick="selectRole(this)">
                    <div class="role-icon" data-color="#0d9488" style="background:rgba(13,148,136,0.12);color:#0d9488;">
                        <i class='bx bxs-ship'></i>
                    </div>
                    <span class="role-name">العمليات</span>
                    <span class="role-user">عماد العمليات</span>
                </div>
                <div class="role-option" data-role="support" onclick="selectRole(this)">
                    <div class="role-icon" data-color="#ea580c" style="background:rgba(234,88,12,0.12);color:#ea580c;">
                        <i class='bx bx-support'></i>
                    </div>
                    <span class="role-name">الدعم الفني</span>
                    <span class="role-user">سارة الدعم</span>
                </div>
                <div class="role-option" data-role="sales_manager" onclick="selectRole(this)">
                    <div class="role-icon" data-color="#059669" style="background:rgba(5,150,105,0.12);color:#059669;">
                        <i class='bx bx-user-check'></i>
                    </div>
                    <span class="role-name">مدير المبيعات</span>
                    <span class="role-user">خالد المدير</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">البريد الإلكتروني / Email</label>
                <div style="position:relative;">
                    <input type="email" class="form-control" id="loginEmail" placeholder="admin@amazonmarine.com"
                        style="padding-right:40px;">
                    <i class='bx bx-envelope'
                        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:1.1rem;"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">كلمة المرور / Password</label>
                <div style="position:relative;">
                    <input type="password" class="form-control" placeholder="••••••••" style="padding-right:40px;">
                    <i class='bx bx-lock-alt'
                        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:1.1rem;"></i>
                </div>
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
                <label class="form-check">
                    <input type="checkbox" checked> تذكرني
                </label>
                <a href="forgot-password.html" style="font-size:0.8rem;color:var(--accent-cyan);font-weight:500;">نسيت كلمة المرور؟</a>
            </div>

            <button class="btn btn-primary" onclick="handleLogin()" id="loginBtn">
                <i class='bx bx-log-in'></i> تسجيل الدخول
            </button>

            <div class="login-footer">
                <p>© 2026 Amazon Marine. جميع الحقوق محفوظة</p>
            </div>
        </div>
    </div>

    <script src="js/role-auth.js"></script>
    <script>
        let selectedRole = 'admin';

        // Email presets per role
        const roleEmails = {
            admin: 'mostafa@amazonmarine.com',
            sales: 'ahmed@amazonmarine.com',
            accounting: 'karim@amazonmarine.com',
            pricing: 'nadia@amazonmarine.com',
            operation: 'operations@amazonmarine.com',
            support: 'support@amazonmarine.com',
            sales_manager: 'sales.manager@amazonmarine.com'
        };

        function selectRole(el) {
            // Remove selection from all
            document.querySelectorAll('.role-option').forEach(opt => {
                opt.classList.remove('selected');
                const icon = opt.querySelector('.role-icon');
                const c = icon.dataset.color;
                // Reset to light background
                icon.style.background = hexToRgba(c, 0.1);
                icon.style.color = c;
            });

            // Select this one
            el.classList.add('selected');
            selectedRole = el.dataset.role;

            // Update email field
            document.getElementById('loginEmail').value = roleEmails[selectedRole];

            // Apply solid background to selected icon
            const selectedIcon = el.querySelector('.role-icon');
            selectedIcon.style.background = selectedIcon.dataset.color;
            selectedIcon.style.color = '#fff';
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        // Initialize first selection visual
        selectRole(document.querySelector('.role-option.selected'));

        function handleLogin() {
            if (typeof setRole === 'function') {
                setRole(selectedRole);
            } else {
                localStorage.setItem('amazonMarineRole', selectedRole);
            }
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
