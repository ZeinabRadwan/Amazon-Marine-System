<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Marine — نسيت كلمة المرور</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <img src="logo/logo (1).png" alt="Amazon Marine Logo">
                <h2>Amazon Marine</h2>
                <p>استعادة كلمة المرور</p>
            </div>
            <p class="text-muted" style="margin-bottom:20px;font-size:0.9rem;">أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة تعيين كلمة المرور.</p>
            <div class="form-group">
                <label class="form-label">البريد الإلكتروني</label>
                <input type="email" class="form-control" id="forgotEmail" placeholder="email@amazonmarine.com">
            </div>
            <button class="btn btn-primary" onclick="handleForgotSubmit()" style="width:100%;">
                <i class='bx bx-send'></i> إرسال رابط الاستعادة
            </button>
            <div style="margin-top:24px;text-align:center;">
                <a href="index.html" style="font-size:0.85rem;color:var(--accent-cyan);">العودة لتسجيل الدخول</a>
            </div>
        </div>
    </div>
    <script>
        function handleForgotSubmit() {
            const email = document.getElementById('forgotEmail').value;
            if (!email) { alert('أدخل البريد الإلكتروني'); return; }
            alert('تم إرسال رابط استعادة كلمة المرور إلى ' + email);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
