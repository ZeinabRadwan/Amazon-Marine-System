# Apache: proxy /api on the CRM host to the Laravel API on back.crm-amazonltd.online
# (same-origin for the browser — helps mobile TLS/CORS.)
#
# Enable modules (as root), then adjust paths and SSL cert paths:
#   a2enmod proxy proxy_http ssl rewrite headers
#   systemctl reload apache2
#
# Put the block below inside the <VirtualHost *:443> for crm-amazonltd.live
# (where your React dist is the DocumentRoot). Do NOT duplicate DocumentRoot for /api —
# ProxyPass is evaluated first for /api when placed correctly.

# SSL to upstream (required when proxy_pass uses https://)
SSLProxyEngine on
# If the API host uses a valid public cert, prefer verifying:
# SSLProxyVerify none
# (Only use relaxed verify if you have a broken cert on back — fix the cert instead.)

# Forward /api/... to the API server (keep path identical: /api/v1/...)
ProxyPass        /api https://back.crm-amazonltd.live/api
ProxyPassReverse /api https://back.crm-amazonltd.live/api

# Laravel sees the real public host/scheme (optional but recommended)
RequestHeader set X-Forwarded-Proto "https"
RequestHeader set X-Forwarded-Host "crm-amazonltd.live"

# After this works, set front/.env.production:
#   VITE_API_URL=https://crm-amazonltd.live
# Then: npm run build and deploy dist.
