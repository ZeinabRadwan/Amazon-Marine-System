# Optional: serve the API under the SAME host as the SPA (https://crm-amazonltd.live/api/...)
# so the browser never calls https://back.crm-amazonltd.live directly.
# Fixes many mobile "Load failed" cases when the API subdomain has TLS/certificate issues.
#
# Add inside the `server { ... }` block for crm-amazonltd.live (adjust paths).
# Then set front/.env.production: VITE_API_URL=https://crm-amazonltd.live and rebuild the front.

location /api/ {
    proxy_pass https://back.crm-amazonltd.live;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host back.crm-amazonltd.live;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
}
